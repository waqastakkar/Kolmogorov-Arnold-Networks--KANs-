name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  qa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.20"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install project
        run: uv pip install --system -e ".[dev]"

      - name: Lint
        run: uv run ruff check src tests scripts

      - name: Type check
        run: uv run mypy src

      - name: Tests
        run: uv run pytest

      - name: DVC dry repro
        run: uv run dvc repro --dry || true
