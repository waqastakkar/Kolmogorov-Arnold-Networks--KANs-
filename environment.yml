# Conda mirror of pyproject.toml (Python 3.11, CUDA 12.1, PyTorch 2.4).
# Kept in sync with `pyproject.toml`; uv.lock is the canonical lockfile.
name: brd4-kan
channels:
  - pytorch
  - nvidia
  - conda-forge
  - bioconda
dependencies:
  - python=3.11
  - pip
  - pytorch=2.4.1
  - pytorch-cuda=12.1
  - rdkit=2024.03
  - numpy=1.26.4
  - pandas=2.2.3
  - scikit-learn=1.5.2
  - xgboost=2.1.1
  - matplotlib=3.9.2
  - cairosvg=2.7.1
  - pyyaml=6.0.2
  - python-dotenv=1.0.1
  - joblib=1.4.2
  - tqdm=4.66.5
  - pip:
      - chembl_structure_pipeline==1.2.2
      - mordredcommunity==2.0.6
      - datamol==0.12.4
      - chemprop==2.0.4
      - efficient-kan==0.1.0
      - pykan==0.2.8
      - optuna==4.0.0
      - mlflow==2.17.0
      - dvc[all]==3.55.2
      - hydra-core==1.3.2
      - typer==0.12.5
      - pydantic==2.9.2
      - svgutils==0.3.4
